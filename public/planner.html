<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner - Avora</title>

<style>
:root {
  --bg-main:#050a18;
  --bg-card:#0f172a;
  --accent:#6366f1;
  --text-main:#e5e7eb;
  --text-muted:#9ca3af;
  --border-soft:rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:-apple-system, sans-serif;
  background:var(--bg-main);
  color:var(--text-main);
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card {
  background:var(--bg-card);
  padding:16px;
  border-radius:12px;
  margin-bottom:16px;
  border:1px solid var(--border-soft);
}

input, select {
  width:100%;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid var(--border-soft);
  background:#020617;
  color:white;
}

button {
  padding:10px;
  background:var(--accent);
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.table-card {
  margin-bottom:12px;
  padding:12px;
  border-radius:10px;
  border:1px solid var(--border-soft);
}
</style>
</head>

<body>

<div class="container">

<h2>Event Planner</h2>

<!-- CREATE TABLE -->
<div class="card">
  <h3>Create Table</h3>
  <input id="tableName" placeholder="Table Name">
  <input id="tableSeats" type="number" placeholder="Seats">
  <button onclick="createTable()">Add Table</button>
</div>

<!-- TABLE LIST -->
  <div class="card">
  <h3>🧠 Smart Insights</h3>
  <div id="insights" style="color:var(--text-muted); font-size:14px;">
    Loading...
  </div>
</div>
<div id="tables"></div>

</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection, addDoc, getDocs, doc, updateDoc, getDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const eventId = new URLSearchParams(window.location.search).get("eventId");

const tableRef = collection(db, "events", eventId, "tables");
const guestRef = collection(db, "events", eventId, "guests");

let guests = [];

// LOAD GUESTS
async function loadGuests() {
  const snap = await getDocs(guestRef);
  guests = [];
  snap.forEach(d => {
    guests.push({ id: d.id, ...d.data() });
  });
}

// CREATE TABLE
window.createTable = async function () {
  const name = document.getElementById("tableName").value;
  const seats = parseInt(document.getElementById("tableSeats").value);

  if (!name || !seats) return;

  await addDoc(tableRef, {
  name: name || "Table",
  seats,
  guests: []
});

  document.getElementById("tableName").value = "";
  document.getElementById("tableSeats").value = "";

  loadTables();
};

// ASSIGN GUEST
window.assignGuest = async function (tableId) {
  const select = document.getElementById("guest-" + tableId);
  const guestId = select.value;

  const ref = doc(db, "events", eventId, "tables", tableId);
  const snap = await getDoc(ref);
  const table = snap.data();

  if (!table) return;

  if (table.guests.includes(guestId)) return;

  if (table.guests.length >= table.seats) {
    alert("Table full");
    return;
  }

  const updated = [...table.guests, guestId];

  await updateDoc(ref, { guests: updated });

  loadTables();
};

// LOAD TABLES
async function loadTables() {
  const container = document.getElementById("tables");
  container.innerHTML = "";

   const tablesData = [];

  const snap = await getDocs(tableRef);

  snap.forEach(d => {
    const t = d.data();
    tablesData.push(t);

    container.innerHTML += `
      <div class="card">
        <strong>${t.name} (${t.guests.length}/${t.seats})</strong>

        <select id="guest-${d.id}">
          ${guests.map(g => `<option value="${g.id}">${g.name}</option>`).join("")}
        </select>

        <button onclick="assignGuest('${d.id}')">Add Guest</button>

        <div style="margin-top:8px; color:var(--text-muted)">
          ${t.guests.map(gid => {
            const g = guests.find(x => x.id === gid);
            return g ? g.name : "";
          }).join(", ")}
        </div>
      </div>
    `;
  });
  const insights = generateInsights(tablesData);
  await saveInsightsToAgent(insights);

const el = document.getElementById("insights");

if (insights.length === 0) {
  el.innerText = "All tables perfectly balanced 👍";
} else {
  el.innerHTML = insights.map(i => `<div>${i}</div>`).join("");
}
}

 function generateInsights(tables) {
  const insights = [];

  let totalSeats = 0;
  let totalGuests = 0;

  const emptyTables = [];
  const fullTables = [];
  const underfilled = [];

  tables.forEach(t => {
    totalSeats += t.seats;
    totalGuests += t.guests.length;

    if (t.guests.length === 0) {
      emptyTables.push(t);
      insights.push(`⚠️ ${t.name} is empty`);
    }

    if (t.guests.length === t.seats) {
      fullTables.push(t);
      insights.push(`✅ ${t.name} is full`);
    }

    if (t.guests.length > 0 && t.guests.length < t.seats) {
      underfilled.push(t);
    }
  });

  const remaining = totalSeats - totalGuests;

  // 🔥 NEW: Capacity insight
  if (remaining > 0) {
    insights.push(`ℹ️ ${remaining} total open seats`);
  }

  // 🔥 NEW: Consolidation insight
  if (emptyTables.length > 0 && underfilled.length > 1) {
    insights.push(`💡 You can consolidate guests into fewer tables`);
  }

  // 🔥 NEW: Imbalance detection
  if (underfilled.length > 1) {
    const sizes = underfilled.map(t => t.guests.length);
    const max = Math.max(...sizes);
    const min = Math.min(...sizes);

    if (max - min >= 2) {
      insights.push(`⚖️ Tables are uneven — consider redistributing guests`);
    }
  }

  // 🔥 NEW: Over-table warning
  if (emptyTables.length >= 2) {
    insights.push(`🚨 Too many empty tables — reduce table count`);
  }

  // 🔥 NEW: Optimization hint
  if (totalGuests > 0 && remaining > 0) {
    insights.push(`🎯 You can optimize seating for better density`);
  }

  // 🔥 NEW: Completion signal
  if (remaining === 0) {
    insights.push(`🔥 Perfect seating — all seats filled`);
  }

  return insights;
}

  async function saveInsightsToAgent(insights) {
  const ref = doc(db, "agent_memory", "avora_main");

  try {
    await updateDoc(ref, {
      planner_insights: insights,
      planner_last_updated: Date.now()
    });
  } catch (e) {
    console.log("Agent memory not ready yet");
  }
}

// INIT
await loadGuests();
await loadTables();
</script>
</body>
</html>
