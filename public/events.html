<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events - Avora</title>

<style>
:root {
  --bg-main:#050a18;
  --bg-card:#0f172a;
  --accent:#6366f1;
  --text-main:#e5e7eb;
  --text-muted:#9ca3af;
  --border-soft:rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:-apple-system;
  background:var(--bg-main);
  color:var(--text-main);
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid var(--border-soft);
}

.container {
  max-width:800px;
  margin:auto;
  padding:20px;
}

.card {
  background:var(--bg-card);
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
  cursor:pointer;
  border:1px solid var(--border-soft);
}

.card:hover {
  border-color:var(--accent);
}

.button {
  display:inline-block;
  padding:12px 16px;
  background:var(--accent);
  border-radius:10px;
  margin-bottom:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
  <div>AVORA</div>
  <div onclick="logout()" style="cursor:pointer;">Logout</div>
</div>

<div class="container">

  <h2>Your Events</h2>

  <div class="button" onclick="goCreate()">+ Create Event</div>

  <div id="eventList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  query, 
  where, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAA2Tl7kWuX1RQcqeVgRR5cf_Mwt-DZX-w",
  authDomain: "avora-fc8b4.firebaseapp.com",
  projectId: "avora-fc8b4"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

const list = document.getElementById("eventList");

// AUTH + LOAD EVENTS
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "./login.html";
    return;
  }

  loadEvents(user.uid);
});

// LOAD EVENTS (🔥 OWNER FILTER HERE)
function loadEvents(uid) {
  const q = query(
    collection(db, "events"),
    where("ownerId", "==", uid)
  );

  onSnapshot(q, (snap) => {
    list.innerHTML = "";

if (snap.empty) {
  list.innerHTML = `
    <div style="color:var(--text-muted); margin-top:20px;">
      No events yet. Create your first event.
    </div>
  `;
  return;
}
    snap.forEach(docSnap => {
      const data = docSnap.data();

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div style="font-size:18px; font-weight:600;">${data.name}</div>
        <div style="color:var(--text-muted); margin-top:4px;">
          ${data.date || "No date"}
        </div>
      `;

      div.onclick = () => {
        window.location.href = "./dashboard.html?eventId=" + docSnap.id;
      };

      list.appendChild(div);
    });
  });
}

// NAV
window.goCreate = function () {
  window.location.href = "./create-event.html";
};

window.logout = async function () {
  await signOut(auth);
  window.location.href = "./login.html";
};


  
</script>

</body>
</html>
