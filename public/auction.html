<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auction - Avora</title>

<style>
:root {
  --bg-main:#050a18;
  --bg-card:#0f172a;
  --accent:#6366f1;
  --text-main:#e5e7eb;
  --text-muted:#9ca3af;
  --border-soft:rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:-apple-system;
  background:var(--bg-main);
  color:var(--text-main);
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid var(--border-soft);
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card {
  background:var(--bg-card);
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border-soft);
  background:#020617;
  color:white;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
  <div onclick="goHome()" style="cursor:pointer;">AVORA</div>

  <div style="display:flex; gap:15px;">
    <span onclick="goEvents()" style="cursor:pointer;">Events</span>
    <span onclick="goDashboard()" style="cursor:pointer;">Dashboard</span>
    <span onclick="goGuests()" style="cursor:pointer;">Guests</span>
    <span onclick="goCheckIn()" style="cursor:pointer;">Check-In</span>
  </div>
</div>

<div class="container">

  <h2>Auction Items</h2>

  <input id="itemName" placeholder="Item name">
  <input id="startingBid" placeholder="Starting bid">
  <button onclick="addItem()">Add Item</button>

  <div id="itemList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyAA2Tl7kWuX1RQcqeVgRR5cf_Mwt-DZX-w",
  authDomain: "avora-fc8b4.firebaseapp.com",
  projectId: "avora-fc8b4"
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// AUTH
onAuthStateChanged(auth, (user) => {
  if (!user) window.location.href = "./login.html";
});

// EVENT ID
const params = new URLSearchParams(window.location.search);
const eventId = params.get("eventId");

if (!eventId) {
  window.location.href = "./events.html";
  throw new Error("No eventId");
}

// COLLECTION
const itemRef = collection(db, "events", eventId, "auction");
const list = document.getElementById("itemList");

// 🔥 DYNAMIC BID INCREMENT
let bidIncrement = 5;

onSnapshot(doc(db, "events", eventId), (snap) => {
  const data = snap.data();
  if (data && data.bidIncrement) {
    bidIncrement = data.bidIncrement;
  }
});

// ADD ITEM
window.addItem = async function () {
  const name = document.getElementById("itemName").value.trim();
  const bid = Number(document.getElementById("startingBid").value);

  if (!name || !bid) return;

  await addDoc(itemRef, {
    name,
    currentBid: bid
  });

  document.getElementById("itemName").value = "";
  document.getElementById("startingBid").value = "";
};

// LISTEN ITEMS
onSnapshot(itemRef, (snap) => {
  list.innerHTML = "";

  snap.forEach(d => {
    const item = d.data();

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
  <div style="font-size:18px;">${item.name}</div>

  <div style="color:var(--text-muted); margin-top:6px;">
    Current Bid: $${item.currentBid}
  </div>

  <div style="color:var(--text-muted); margin-top:4px;">
    Leading: ${item.leadingBidder || "No bids yet"}
  </div>

  <input class="bidderName" placeholder="Your name" />
  <input class="bidInput" placeholder="Enter bid amount" />

  <button class="bidBtn" style="margin-top:10px;">
    Place Bid
  </button>
`;

    const bidBtn = div.querySelector(".bidBtn");
const bidInput = div.querySelector(".bidInput");
const bidderName = div.querySelector(".bidderName");

bidBtn.onclick = async () => {
  const bidValue = Number(bidInput.value);
  const name = bidderName.value.trim();

  if (!bidValue || !name) {
    alert("Enter name and bid");
    return;
  }

  if (bidValue <= (item.currentBid || 0)) {
    alert("Bid must be higher than current bid");
    return;
  }

  await updateDoc(
    doc(db, "events", eventId, "auction", d.id),
    {
      currentBid: bidValue,
      leadingBidder: name
    }
  );

  bidInput.value = "";
  bidderName.value = "";
};   

    list.appendChild(div);
  });
});

// NAV
window.goHome = () => window.location.href = "./index.html";
window.goEvents = () => window.location.href = "./events.html";

window.goDashboard = () => {
  window.location.href = "./dashboard.html?eventId=" + eventId;
};

window.goGuests = () => {
  window.location.href = "./guests.html?eventId=" + eventId;
};

window.goCheckIn = () => {
  window.location.href = "./checkin.html?eventId=" + eventId;
};
</script>
</body>
</html>
