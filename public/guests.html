<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guests - Avora</title>

<style>
:root {
  --bg-main:#050a18;
  --bg-card:#0f172a;
  --accent:#6366f1;
  --text-main:#e5e7eb;
  --text-muted:#9ca3af;
  --border-soft:rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:-apple-system;
  background:var(--bg-main);
  color:var(--text-main);
}

.nav {
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:1px solid var(--border-soft);
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

.card {
  background:var(--bg-card);
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
}

input {
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border-soft);
  background:#020617;
  color:white;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="nav">
  <div style="display:flex; gap:15px;">
    <span onclick="goEvents()" style="cursor:pointer;">Events</span>
    <span onclick="goDashboard()" style="cursor:pointer;">Dashboard</span>
    <span onclick="goGuests()" style="cursor:pointer;">Guests</span>
    <span onclick="goCheckIn()" style="cursor:pointer;">Check-In</span>
  </div>
</div>

<div class="container">

  <h2>Guest List</h2>

  <input id="guestName" placeholder="Guest name">
  <button onclick="addGuest()">Add Guest</button>

  <div id="guestList"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  addDoc, 
  onSnapshot, 
  doc, 
  updateDoc, 
  deleteDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// ✅ CONFIG FIRST
const firebaseConfig = {
  apiKey: "AIzaSyAA2Tl7kWuX1RQcqeVgRR5cf_Mwt-DZX-w",
  authDomain: "avora-fc8b4.firebaseapp.com",
  projectId: "avora-fc8b4"
};

// ✅ INIT SECOND
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ✅ AUTH LAST
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "./login.html";
  }
});

const params = new URLSearchParams(window.location.search);
const eventId = params.get("eventId");
  if (!eventId) {
  window.location.href = "./events.html";
  throw new Error("No eventId");
}

const guestRef = collection(db, "events", eventId, "guests");

const list = document.getElementById("guestList");

window.addGuest = async function () {
  const name = document.getElementById("guestName").value.trim();
  if (!name) return;

  await addDoc(guestRef, {
    name,
    checkedIn:false
  });

  document.getElementById("guestName").value = "";
};

// REAL-TIME LIST
onSnapshot(guestRef, (snap) => {
  list.innerHTML = "";

  snap.forEach(d => {
  const g = d.data();

    const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
  <input value="${g.name}" style="margin-bottom:6px;" />
  <div style="display:flex; gap:8px;">
    <button class="saveBtn">Save</button>
    <button class="deleteBtn" style="background:#dc2626;">Delete</button>
  </div>
`;

    const input = div.querySelector("input");
const saveBtn = div.querySelector(".saveBtn");
const deleteBtn = div.querySelector(".deleteBtn");

// SAVE
saveBtn.onclick = async () => {
  const newName = input.value.trim();
  if (!newName) return;

  await updateDoc(doc(db, "events", eventId, "guests", d.id), {
    name: newName
  });
};

// DELETE
deleteBtn.onclick = async () => {
  if (!confirm("Delete this guest?")) return;

  await deleteDoc(doc(db, "events", eventId, "guests", d.id));
};

    list.appendChild(div);
  });
});



  window.goEvents = function () {
  window.location.href = "./events.html";
};
</script>

</body>
</html>
