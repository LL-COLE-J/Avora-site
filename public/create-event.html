<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Event - Avora</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#050a18;
  color:#e5e7eb;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:#0f172a;
  padding:30px;
  border-radius:12px;
  width:320px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

h2 {
  margin-bottom:20px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:6px;
  border:none;
  background:#020617;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:#6366f1;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="card">
  <h2>Create Event</h2>

  <input id="eventName" value="Pink Gala 2026">
  <input id="eventDate" type="date">
  <input id="guestCount" value="150">

<button id="createBtn">Create Event</button>
</div>

<!-- FIREBASE INIT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAA2Tl7kWuX1RQcqeVgRR5cf_Mwt-DZX-w",
  authDomain: "avora-fc8b4.firebaseapp.com",
  projectId: "avora-fc8b4",
  storageBucket: "avora-fc8b4.firebasestorage.app",
  messagingSenderId: "520572013150",
  appId: "1:520572013150:web:a7efe5fce0a4e26df342cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("🔥 Firebase connected");

// Set today's date
const dateInput = document.getElementById('eventDate');
if (dateInput) {
  dateInput.valueAsDate = new Date();
}

const btn = document.getElementById('createBtn');

btn.addEventListener("click", async function () {

    btn.innerText = "Creating...";
    btn.disabled = true;

    try {
      const eventData = {
        name: document.getElementById('eventName').value,
        date: document.getElementById('eventDate').value,
        guestCount: Number(document.getElementById('guestCount').value),
        revenue: 0,
        createdAt: new Date()
      };

      const docRef = await addDoc(collection(db, "events"), eventData);

      console.log("✅ Event created:", docRef.id);

      // Redirect with real event ID
      window.location.href = `/dashboard.html?eventId=${docRef.id}`;

    } catch (error) {
      console.error("❌ Error creating event:", error);
      btn.innerText = "Error - Retry";
      btn.disabled = false;
    }


});
</script>
</body>
</html>
