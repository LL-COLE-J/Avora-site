<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Event - Avora</title>

<style>
:root {
  --bg-main: #050a18;
  --bg-card: #0f172a;
  --accent: #6366f1;
  --text-main: #e5e7eb;
  --border-soft: rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg-main);
  color:var(--text-main);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card {
  background:var(--bg-card);
  padding:30px;
  border-radius:12px;
  width:320px;
}

input {
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border-radius:6px;
  border:none;
  background:#020617;
  color:white;
}

button {
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.page {
  display:flex;
  justify-content:center;
  align-items:center;
  height:calc(100vh - 80px);
}

  .nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:1px solid var(--border-soft);
}

.logo {
  font-weight:700;
  cursor:pointer;
}

.nav-links a {
  color:var(--text-muted);
  text-decoration:none;
}
  
</style>
</head>

<body>

<div class="nav">
  <div class="logo" onclick="goHome()">AVORA</div>
  <div class="nav-links">
    <a href="./index.html">Home</a>
  </div>
</div>

<div class="page">
  <div class="card">
  <h2>Create Event</h2>

  <input id="eventName" value="Pink Gala 2026">
  <input id="eventDate" type="date">
  <input id="guestCount" value="150">

  <button id="createBtn">Create Event</button>
</div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAA2Tl7kWuX1RQcqeVgRR5cf_Mwt-DZX-w",
  authDomain: "avora-fc8b4.firebaseapp.com",
  projectId: "avora-fc8b4"
};

// INIT FIRST
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// PROTECT PAGE
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "./login.html";
  }
});

const btn = document.getElementById('createBtn');

btn.addEventListener("click", async () => {

  try {

    const user = auth.currentUser;
    if (!user) {
      alert("Not logged in");
      return;
    }

    btn.innerText = "Creating...";
    btn.disabled = true;

    const eventData = {
      name: document.getElementById('eventName').value,
      date: document.getElementById('eventDate').value,
      guestCount: Number(document.getElementById('guestCount').value),
      checkedIn: 0,
      revenue: 0,
      createdAt: new Date(),
      ownerId: user.uid   // ✅ THIS IS THE ONLY NEW PART
    };

    const docRef = await addDoc(collection(db, "events"), eventData);

    window.location.href = "./setup.html?eventId=" + docRef.id;

  } catch (err) {
    console.error(err);
    alert("Failed to create event");
    btn.innerText = "Create Event";
    btn.disabled = false;
  }

});
</script>

  <script>
function goHome() {
  window.location.href = "./index.html";
}
</script>

</body>
</html>
