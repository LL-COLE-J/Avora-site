<style>
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avora Dashboard</title>

<style>
:root {
  --bg-main: #050a18;
  --bg-card: #0f172a;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.4);
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
  --border-soft: rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg-main);
  color:var(--text-main);
}

/* Layout */
.container {
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

/* Card */
.card {
  background:var(--bg-card);
  padding:24px;
  border-radius:14px;
  border:1px solid var(--border-soft);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* Inputs */
input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid var(--border-soft);
  background:#020617;
  color:white;
  font-size:14px;
}

input:focus {
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 10px var(--accent-glow);
}

/* Buttons */
button {
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  box-shadow:0 0 12px var(--accent-glow);
  transform:translateY(-1px);
}

/* Grid */
.row {
  display:flex;
  gap:20px;
}

.col {
  flex:1;
}

/* Stats */
.stat {
  font-size:28px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

  <h1 id="eventName">Loading...</h1>
  <p id="eventDate"></p>

  <div class="row">

    <div class="card col">
      <div>Guests Checked In</div>
      <div class="stat" id="checkedIn">0</div>
      <button onclick="checkInGuest()">+ Check In Guest</button>
    </div>

    <div class="card col">
      <div>Revenue</div>
      <div class="stat" id="revenue">$0</div>
      <button onclick="addRevenue()">+ Add $100</button>
    </div>

  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAA2Tl7kWuX1RQcqeVgRR5cf_Mwt-DZX-w",
  authDomain: "avora-fc8b4.firebaseapp.com",
  projectId: "avora-fc8b4",
  storageBucket: "avora-fc8b4.firebasestorage.app",
  messagingSenderId: "520572013150",
  appId: "1:520572013150:web:a7efe5fce0a4e26df342cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Get eventId
const params = new URLSearchParams(window.location.search);
const eventId = params.get("eventId");

if (!eventId) {
  document.body.innerHTML = "<h2 style='padding:20px;'>No event ID</h2>";
}

const ref = doc(db, "events", eventId);

// REAL-TIME LISTENER
onSnapshot(ref, (snap) => {
  const data = snap.data();
  if (!data) return;

  document.getElementById("eventName").innerText = data.name;
  document.getElementById("eventDate").innerText = data.date || "";
  document.getElementById("checkedIn").innerText = data.checkedIn || 0;
  document.getElementById("revenue").innerText = "$" + (data.revenue || 0);
});

// ACTIONS
window.addRevenue = async function () {
  await updateDoc(ref, {
    revenue: increment(100)
  });
};

window.checkInGuest = async function () {
  await updateDoc(ref, {
    checkedIn: increment(1)
  });
};

</script>

</body>
</html>

</style>

</head>

<body>

<div class="card">
  <h2>Create Event</h2>

  <input id="eventName" value="Pink Gala 2026">
  <input id="eventDate" type="date">
  <input id="guestCount" value="150">

<button id="createBtn">Create Event</button>
</div>

<!-- FIREBASE INIT -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAA2Tl7kWuX1RQcqeVgRR5cf_Mwt-DZX-w",
  authDomain: "avora-fc8b4.firebaseapp.com",
  projectId: "avora-fc8b4",
  storageBucket: "avora-fc8b4.firebasestorage.app",
  messagingSenderId: "520572013150",
  appId: "1:520572013150:web:a7efe5fce0a4e26df342cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("🔥 Firebase connected");

// Set today's date
const dateInput = document.getElementById('eventDate');
if (dateInput) {
  dateInput.valueAsDate = new Date();
}

const btn = document.getElementById('createBtn');

btn.addEventListener("click", async function () {

    btn.innerText = "Creating...";
    btn.disabled = true;

    try {
      const eventData = {
  name: document.getElementById('eventName').value,
  date: document.getElementById('eventDate').value,
  guestCount: Number(document.getElementById('guestCount').value),
  checkedIn: 0,        // 👈 ADD THIS LINE
  revenue: 0,
  createdAt: new Date()
};

      const docRef = await addDoc(collection(db, "events"), eventData);

      console.log("✅ Event created:", docRef.id);

      // Redirect with real event ID
      window.location.href = `/dashboard.html?eventId=${docRef.id}`;

    } catch (error) {
      console.error("❌ Error creating event:", error);
      btn.innerText = "Error - Retry";
      btn.disabled = false;
    }


});
</script>
</body>
</html>
