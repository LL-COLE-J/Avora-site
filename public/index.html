<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avora | Run the Event</title>

<style>
body {
  margin:0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at 70% 30%, #0b1b3a, #050a18 60%);
  color:#e5e7eb;
}

/* CONTAINER */
.container {
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

/* NAV */
.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #1f2937;
  padding-bottom:20px;
}

.logo {
  font-weight:700;
  font-size:22px;
  letter-spacing:1px;
}

.nav-links {
  display:flex;
  gap:20px;
  align-items:center;
}

.nav-links a {
  color:#9ca3af;
  text-decoration:none;
}

.nav-links a:hover {
  color:white;
}

.btn {
  padding:10px 18px;
  border-radius:8px;
  text-decoration:none;
  font-size:14px;
}

.btn-primary {
  background:#6366f1;
  color:white;
}

.btn-secondary {
  background:#374151;
  color:white;
}

/* HERO */
.hero {
  display:flex;
  align-items:center;
  gap:60px;
  padding:80px 0;
  flex-wrap:wrap;
}

/* LEFT */
.hero-left {
  flex:1;
  min-width:300px;
}

.hero-left h1 {
  font-size:56px;
  line-height:1.1;
  letter-spacing:-1px;
  margin-bottom:20px;
}

.hero-left span {
  color:#6366f1;
}

.hero-left p {
  color:#9ca3af;
  line-height:1.6;
  max-width:520px;
}

/* RIGHT */
.hero-right {
  flex:1;
  min-width:300px;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* DASHBOARD BACK (EVENTOS FEEL) */
.dashboard-bg {
  position:absolute;
  width:520px;
  height:320px;
  background:linear-gradient(145deg, #0f172a, #020617);
  border-radius:20px;
  transform:rotate(-6deg);
  opacity:0.6;
  box-shadow:0 40px 80px rgba(0,0,0,0.6);
}

/* GLOW */
.glow {
  width:420px;
  height:420px;
  background:radial-gradient(circle, rgba(99,102,241,0.25), transparent 70%);
  display:flex;
  justify-content:center;
  align-items:center;
}

/* LOGO ICON */
.logo-icon {
  width:180px;
  opacity:0.95;
}

/* BUTTON ROW */
.cta {
  margin-top:25px;
  display:flex;
  gap:12px;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="container nav">
  <div class="logo">AVORA</div>

  <div class="nav-links">
    <a href="#">Features</a>
    <a href="#">How It Works</a>
    <a href="#" class="btn btn-primary">Request Access</a>
  </div>
</div>

<!-- HERO -->
<div class="container hero">

  <!-- LEFT -->
  <div class="hero-left">
    <h1>
      Run Your Entire Event<br>
      <span>Without the Chaos</span>
    </h1>

    <p>
      Avora gives you real-time control of check-in, auctions, donations, and engagement—so your team can execute flawlessly.
    </p>

    <div class="cta">
      <a href="#" class="btn btn-primary">Book a Demo</a>
      <a href="#" class="btn btn-secondary">See How It Works</a>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="hero-right">

    <!-- background dashboard -->
    <div class="dashboard-bg"></div>

    <!-- glow + logo -->
    <div class="glow">
      <img src="logo-icon.png" class="logo-icon">
    </div>

  </div>

</div>

</body>
</html>
