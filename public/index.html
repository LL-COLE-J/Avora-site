<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Avora | Event & Fundraising Platform</title>

  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#0f172a; color:#e5e7eb; }
    .container { max-width:1100px; margin:auto; padding:40px 20px; }
    h1 { font-size:48px; margin-bottom:10px; line-height:1.2; }
    h2 { font-size:28px; margin-bottom:10px; }
    p { color:#9ca3af; line-height:1.6; }
    .btn { display:inline-block; padding:12px 24px; background:#6366f1; color:white; text-decoration:none; border-radius:8px; margin-top:15px; }
    .section { padding:60px 0; border-bottom:1px solid #1f2937; }
    .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(250px,1fr)); gap:20px; }
    .card { background:#111827; padding:20px; border-radius:12px; }
    input, textarea { width:100%; padding:12px; margin-top:10px; border-radius:6px; border:none; }
    form { max-width:500px; }
    footer { text-align:center; padding:20px; color:#6b7280; }
  </style>
</head>

 <div class="container" style="display:flex; align-items:center; justify-content:space-between; padding-bottom:20px; border-bottom:1px solid #1f2937;">
