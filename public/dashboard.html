<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avora Dashboard</title>

<style>
:root {
  --bg-main: #050a18;
  --bg-card: #0f172a;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.4);
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
  --border-soft: rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg-main);
  color:var(--text-main);
}

/* Layout */
.container {
  max-width:900px;
  margin:auto;
  padding:40px 20px;
  margin-top:20px;
}

/* Card */
.card {
  background:var(--bg-card);
  padding:24px;
  border-radius:14px;
  border:1px solid var(--border-soft);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* Inputs */
input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid var(--border-soft);
  background:#020617;
  color:white;
  font-size:14px;
}

input:focus {
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 10px var(--accent-glow);
}

/* Buttons */
button {
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  box-shadow:0 0 12px var(--accent-glow);
  transform:translateY(-1px);
}

/* Grid */
.row {
  display:flex;
  gap:20px;
}

.col {
  flex:1;
}

/* Stats */
.stat {
  font-size:28px;
  margin-top:10px;
}

.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:1px solid var(--border-soft);
}

.logo {
  font-weight:700;
  cursor:pointer;
}

.nav-links a {
  color:var(--text-muted);
  text-decoration:none;
}

 .card.clickable {
  cursor:pointer;
  transition:0.2s;
}

.card.clickable:hover {
  transform:translateY(-2px);
  box-shadow:0 0 15px var(--accent-glow);
} 
  
</style>
</head>

<body>

<div class="nav">
  <div class="logo" onclick="goHome()">AVORA</div>
  <div class="nav-links">
    <a href="./index.html">Home</a>
     <button onclick="logout()" style="width:auto; padding:8px 12px;">Logout</button>
  </div>
</div>

<div class="container">
  <h1 id="eventName">Loading...</h1>
  <p id="eventDate"></p>

  <div id="nextStepCard" class="card" style="margin-bottom:20px;">
  <div style="color:var(--text-muted)">Next Step</div>
  <div id="nextStepText" class="stat">Loading...</div>
</div>

<div class="row" id="modulesRow"></div>



  
</div>

<script type="module">
import { db, auth } from "./firebase.js";

import { 
  doc, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { 
  onAuthStateChanged, 
  signOut 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// AUTH GUARD
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "./login.html";
    return;
  }

  initDashboard();
});

// MAIN APP
function initDashboard() {
  const params = new URLSearchParams(window.location.search);
  const eventId = params.get("eventId");

  if (!eventId) {
    document.body.innerHTML = "<h2 style='padding:20px;'>No event ID</h2>";
    throw new Error("No eventId");
  }

  const ref = doc(db, "events", eventId);

  onSnapshot(ref, (snap) => {
    const data = snap.data();
    if (!data) return;

    const modules = data.modules || {
      checkIn: true,
      donations: true,
      auction: false
    };

    const row = document.getElementById("modulesRow");
    row.innerHTML = "";

    document.getElementById("eventName").innerText = data.name;
    document.getElementById("eventDate").innerText = data.date || "";

    if (modules.checkIn) {
      row.innerHTML += `
        <div class="card col clickable" onclick="goToCheckIn()">
          <div>Guests Checked In</div>
          <div class="stat">${data.checkedIn || 0}</div>
          <div style="color:var(--text-muted); margin-top:8px;">Tap to open</div>
        </div>
      `;
    }

    if (modules.donations) {
      row.innerHTML += `
        <div class="card col">
          <div>Revenue</div>
          <div class="stat">$${data.revenue || 0}</div>
        </div>
      `;
    }

    if (modules.auction) {
      row.innerHTML += `
        <div class="card col">
          <div>Silent Auction</div>
          <div class="stat">Coming Soon</div>
          <button disabled>Setup Auction</button>
        </div>
      `;
    }

    row.innerHTML += `
      <div class="card col clickable" onclick="goToGuests()">
        <div>Guests</div>
        <div class="stat">Manage</div>
        <div style="color:var(--text-muted); margin-top:8px;">Add / Edit List</div>
      </div>
    `;
  });
}

// NAV
window.goToGuests = function () {
  const eventId = new URLSearchParams(window.location.search).get("eventId");
  window.location.href = "./guests.html?eventId=" + eventId;
};

window.goToCheckIn = function () {
  const eventId = new URLSearchParams(window.location.search).get("eventId");
  window.location.href = "./checkin.html?eventId=" + eventId;
};

// LOGOUT
window.logout = async function () {
  await signOut(auth);
  window.location.href = "./login.html";
};
</script>

  <script>
function goHome() {
  window.location.href = "./index.html";
}
</script>

<script type="module">
  import { getMemory } from "./memory.js";

  const memory = await getMemory();

  console.log("MEMORY:", memory);

  if (!memory) return;

  // SET NEXT STEP TEXT
  const nextStepEl = document.getElementById("nextStepText");

  if (nextStepEl) {
    nextStepEl.innerText = memory.current_state.next_task;
  }
</script>

</body>
</html>
