<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Avora</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background: radial-gradient(circle at 70% 30%, #0b1b3a, #050a18 60%);
  color:#e5e7eb;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

.header {
  font-size:28px;
  margin-bottom:30px;
}

.sub {
  color:#9ca3af;
  margin-bottom:20px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap:20px;
}

.card {
  background:linear-gradient(180deg, #0f172a, #020617);
  border:1px solid rgba(99,102,241,0.08);
  border-radius:12px;
  padding:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

.label {
  color:#9ca3af;
  font-size:14px;
}

.value {
  font-size:26px;
  margin-top:8px;
}

.live {
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:20px;
}

.dot {
  width:8px;
  height:8px;
  background:#22c55e;
  border-radius:50%;
  box-shadow:0 0 8px rgba(34,197,94,0.6);
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0% { opacity:0.4; transform:scale(0.9); }
  50% { opacity:1; transform:scale(1.2); }
  100% { opacity:0.4; transform:scale(0.9); }
}

.btn {
  margin-top:30px;
  padding:14px 22px;
  background:#6366f1;
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  font-size:14px;
}
</style>
</head>

<body>

<div class="container">

  <div class="header" id="eventName">Loading Event...</div>
  <div class="sub" id="eventDate"></div>

  <div class="live">
    <div class="dot"></div>
    <div style="color:#22c55e;">Live Event Running</div>
  </div>

  <div class="grid">

    <div class="card">
      <div class="label">Guests</div>
      <div class="value" id="guestCount">0</div>
    </div>

    <div class="card">
      <div class="label">Checked In</div>
      <div class="value" id="checkedIn">0</div>
    </div>

    <div class="card">
      <div class="label">Auction Revenue</div>
      <div class="value">$12,450</div>
    </div>

  </div>

  <button class="btn" onclick="goToCheckIn()">Open Check-In</button>

</div>

<script>
const event = JSON.parse(localStorage.getItem("avora_event"));

if (!event) {
  document.getElementById("eventName").innerText = "No Event Found";
} else {
  document.getElementById("eventName").innerText = event.name;
  document.getElementById("eventDate").innerText = event.date || "";
  document.getElementById("guestCount").innerText = event.guests;
  document.getElementById("checkedIn").innerText = event.checkedIn;
}

function goToCheckIn() {
  window.location.href = "/checkin.html"; // next step
}
</script>

</body>
</html>
