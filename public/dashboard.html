<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avora Dashboard</title>

<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#050a18;
  color:#e5e7eb;
}

.container {
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

h1 {
  margin-bottom:10px;
}

.card {
  background:#0f172a;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

.stat {
  font-size:28px;
  margin-top:10px;
}

.row {
  display:flex;
  gap:20px;
}

.col {
  flex:1;
}
</style>
</head>

<body>

<div class="container">

  <h1 id="eventName">Loading...</h1>
  <p id="eventDate"></p>

  <div class="row">
    <div class="card col">
      <div>Guests</div>
      <div class="stat" id="guestCount">0</div>
    </div>

    <div class="card col">
      <div>Revenue</div>
      <div class="stat" id="revenue">$0</div>
    </div>
  </div>

</div>

<!-- FIREBASE + DATA -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAA2Tl7kWuX1RQcqeVgRR5cf_Mwt-DZX-w",
  authDomain: "avora-fc8b4.firebaseapp.com",
  projectId: "avora-fc8b4",
  storageBucket: "avora-fc8b4.firebasestorage.app",
  messagingSenderId: "520572013150",
  appId: "1:520572013150:web:a7efe5fce0a4e26df342cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

console.log("🔥 Dashboard connected");

// Get eventId from URL
const params = new URLSearchParams(window.location.search);
const eventId = params.get("eventId");

if (!eventId) {
  document.body.innerHTML = "<h2 style='padding:20px;'>No event ID provided</h2>";
}

// Listen to event (REAL-TIME)
const ref = doc(db, "events", eventId);

onSnapshot(ref, (snap) => {
  const data = snap.data();

  if (!data) return;

  document.getElementById("eventName").innerText = data.name;
  document.getElementById("eventDate").innerText = data.date || "";
  document.getElementById("guestCount").innerText = data.guestCount;
  document.getElementById("revenue").innerText = "$" + (data.revenue || 0);
});
</script>

</body>
</html>
