<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avora Dashboard</title>

<style>
:root {
  --bg-main: #050a18;
  --bg-card: #0f172a;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.4);
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
  --border-soft: rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg-main);
  color:var(--text-main);
}

.container {
  max-width:900px;
  margin:auto;
  padding:40px 20px;
  margin-top:20px;
}

.card {
  background:var(--bg-card);
  padding:24px;
  border-radius:14px;
  border:1px solid var(--border-soft);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid var(--border-soft);
  background:#020617;
  color:white;
  font-size:14px;
}

input:focus {
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 10px var(--accent-glow);
}

button {
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  box-shadow:0 0 12px var(--accent-glow);
  transform:translateY(-1px);
}

.row {
  display:flex;
  gap:20px;
}

.col {
  flex:1;
}

.stat {
  font-size:28px;
  margin-top:10px;
}

.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:1px solid var(--border-soft);
}

.logo {
  font-weight:700;
  cursor:pointer;
}

.nav-links a {
  color:var(--text-muted);
  text-decoration:none;
}

.card.clickable {
  cursor:pointer;
  transition:0.2s;
}

.card.clickable:hover {
  transform:translateY(-2px);
  box-shadow:0 0 15px var(--accent-glow);
}
</style>
</head>

<body>

<div class="nav">
  <div onclick="goHome()" style="cursor:pointer;">AVORA</div>

  <div style="display:flex; gap:15px;">
    <span onclick="goEvents()" style="cursor:pointer;">Events</span>
    <span onclick="goDashboard()" style="cursor:pointer;">Dashboard</span>
    <span onclick="goGuests()" style="cursor:pointer;">Guests</span>
    <span onclick="goCheckIn()" style="cursor:pointer;">Check-In</span>
  </div>
</div>
<div class="container">
  <h1 id="eventName">Loading...</h1>
  <p id="eventDate"></p>

  <!-- ✅ MEMORY CARD -->
  <div id="nextStepCard" class="card" style="margin-bottom:20px;">
  <div style="color:var(--text-muted)">Next Step</div>
  <div id="nextStepText" class="stat">Loading...</div>
  <div id="progressText" style="margin-top:8px; color:var(--text-muted);"></div>
   <div id="actionHint" style="margin-top:6px; font-size:13px; color:var(--text-muted);"></div> 

    



  <!-- 👇 THIS IS THE BUTTON -->
  <button id="completeStepBtn" style="margin-top:12px;">
    Mark Complete
  </button>
</div>

  <!-- ✅ MODULES -->
  <div class="row" id="modulesRow"></div>
</div>

<script type="module">
import { db, auth } from "./firebase.js";
import { getMemory } from "./memory.js";
import { doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

// AUTH
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "./login.html";
    return;
  }

  initDashboard();
});

// MAIN
async function initDashboard() {
  const params = new URLSearchParams(window.location.search);
  const eventId = params.get("eventId");

  if (!eventId) {
    document.body.innerHTML = "<h2 style='padding:20px;'>No event ID</h2>";
    throw new Error("No eventId");
  }

  // 🔥 LOAD MEMORY
  const memory = await getMemory();
  console.log("MEMORY:", memory);

  // 🔥 SET NEXT STEP TEXT
  if (memory) {
    const nextStepEl = document.getElementById("nextStepText");
    const total = memory.roadmap.length;
const complete = memory.roadmap.filter(r => r.status === "complete").length;

const progressEl = document.getElementById("progressText");
if (progressEl) {
  progressEl.innerText = `${complete} / ${total} complete`;
}

    if (nextStepEl) {
     let suggestion = memory.current_state.next_task;

if (suggestion.toLowerCase().includes("donation")) {
  suggestion = "💰 Add donations to start generating revenue";
}

if (suggestion.toLowerCase().includes("guest")) {
  suggestion = "👥 Improve guest experience / management";
}

if (suggestion.toLowerCase().includes("auction")) {
  suggestion = "🏷️ Build auction module (high value feature)";
}

      if (hintEl) {
  let hint = "";

  const task = memory.current_state.next_task.toLowerCase();

  if (task.includes("donation")) {
    hint = "Add a simple donation input + update dashboard revenue";
  } 
  else if (task.includes("guest")) {
    hint = "Improve guest flow or add bulk import";
  } 
  else if (task.includes("auction")) {
    hint = "Start with item list and basic bidding";
  } 
  else {
    hint = "Continue building core functionality";
  }
const hintEl = document.getElementById("actionHint");
  hintEl.innerText = hint;
}

nextStepEl.innerText = "Next: " + suggestion;

      const remaining = memory.roadmap.filter(r => r.status !== "complete");
      if (remaining.length > 0) {
        nextStepEl.innerText += ` (${remaining.length} remaining)`;
      }
    }
  }

  // 🔥 BUTTON LOGIC (CORRECT PLACE)
  const btn = document.getElementById("completeStepBtn");

  if (btn && memory) {
    btn.onclick = async () => {
      console.log("CLICKED COMPLETE");

      try {
        btn.innerText = "Updating...";
        

        // 1. Mark current module complete
        const updatedRoadmap = memory.roadmap.map(step => {
          if (step.name === memory.current_state.module) {
            return { ...step, status: "complete" };
          }
          return step;
        });

        // 2. Find next incomplete step
        const next = updatedRoadmap.find(s => s.status !== "complete");

        // 3. Build new state
        const newState = {
          module: next ? next.name : "complete",
          last_task: memory.current_state.next_task,
          next_task: next ? next.name : "All steps complete",
          status: next ? "in_progress" : "complete"
        };

        // 4. Update Firestore
        const memRef = doc(db, "agent_memory", "avora_main");

        await updateDoc(memRef, {
          roadmap: updatedRoadmap,
          current_state: newState
        });
        location.reload();

        btn.innerText = "Done";

      } catch (err) {
        console.error(err);
        btn.innerText = "Error";
        btn.disabled = false;
      }
    };
  }

  // 🔥 LOAD EVENT DATA
  const ref = doc(db, "events", eventId);

  onSnapshot(ref, (snap) => {
    const data = snap.data();
    if (!data) return;

    const modules = data.modules || {
      checkIn: true,
      donations: true,
      auction: false
    };

    const row = document.getElementById("modulesRow");
    row.innerHTML = "";

    document.getElementById("eventName").innerText = data.name;
    document.getElementById("eventDate").innerText = data.date || "";

    if (modules.checkIn) {
      row.innerHTML += `
        <div class="card col clickable" onclick="goToCheckIn()">
          <div>Guests Checked In</div>
          <div class="stat">${data.checkedIn || 0}</div>
          <div style="color:var(--text-muted); margin-top:8px;">Tap to open</div>
        </div>
      `;
    }

    if (modules.donations) {
      row.innerHTML += `
        <div class="card col">
          <div>Revenue</div>
          <div class="stat">$${data.revenue || 0}</div>
        </div>
      `;
    }

    if (modules.auction) {
      row.innerHTML += `
        <div class="card col">
          <div>Silent Auction</div>
          <div class="stat">Coming Soon</div>
          <button disabled>Setup Auction</button>
        </div>
      `;
    }

    row.innerHTML += `
      <div class="card col clickable" onclick="goToGuests()">
        <div>Guests</div>
        <div class="stat">Manage</div>
        <div style="color:var(--text-muted); margin-top:8px;">Add / Edit List</div>
      </div>
    `;
  });
}

// NAV
window.goToGuests = function () {
  const eventId = new URLSearchParams(window.location.search).get("eventId");
  window.location.href = "./guests.html?eventId=" + eventId;
};

window.goToCheckIn = function () {
  const eventId = new URLSearchParams(window.location.search).get("eventId");
  window.location.href = "./checkin.html?eventId=" + eventId;
};

window.logout = async function () {
  await signOut(auth);
  window.location.href = "./login.html";
};
</script>

<script>

  window.goEvents = function () {
  window.location.href = "./events.html";
};

const params = new URLSearchParams(window.location.search);
const eventId = params.get("eventId");

window.goDashboard = function () {
  if (!eventId) return;
  window.location.href = "./dashboard.html?eventId=" + eventId;
};

window.goGuests = function () {
  if (!eventId) return;
  window.location.href = "./guests.html?eventId=" + eventId;
};

window.goCheckIn = function () {
  if (!eventId) return;
  window.location.href = "./checkin.html?eventId=" + eventId;
};
  
</script>

</body>
</html>
