<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avora Dashboard</title>

<style>
:root {
  --bg-main: #050a18;
  --bg-card: #0f172a;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.4);
  --text-main: #e5e7eb;
  --text-muted: #9ca3af;
  --border-soft: rgba(255,255,255,0.08);
}

body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:var(--bg-main);
  color:var(--text-main);
}

/* Layout */
.container {
  max-width:900px;
  margin:auto;
  padding:40px 20px;
  margin-top:20px;
}

/* Card */
.card {
  background:var(--bg-card);
  padding:24px;
  border-radius:14px;
  border:1px solid var(--border-soft);
  box-shadow:0 20px 60px rgba(0,0,0,0.5);
}

/* Inputs */
input {
  width:100%;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  border:1px solid var(--border-soft);
  background:#020617;
  color:white;
  font-size:14px;
}

input:focus {
  outline:none;
  border-color:var(--accent);
  box-shadow:0 0 10px var(--accent-glow);
}

/* Buttons */
button {
  width:100%;
  padding:12px;
  background:var(--accent);
  border:none;
  border-radius:10px;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button:hover {
  box-shadow:0 0 12px var(--accent-glow);
  transform:translateY(-1px);
}

/* Grid */
.row {
  display:flex;
  gap:20px;
}

.col {
  flex:1;
}

/* Stats */
.stat {
  font-size:28px;
  margin-top:10px;
}

.nav {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px;
  border-bottom:1px solid var(--border-soft);
}

.logo {
  font-weight:700;
  cursor:pointer;
}

.nav-links a {
  color:var(--text-muted);
  text-decoration:none;
}

 .card.clickable {
  cursor:pointer;
  transition:0.2s;
}

.card.clickable:hover {
  transform:translateY(-2px);
  box-shadow:0 0 15px var(--accent-glow);
} 
  
</style>
</head>

<body>

<div class="nav">
  <div class="logo" onclick="goHome()">AVORA</div>
  <div class="nav-links">
    <a href="./index.html">Home</a>
     <button onclick="logout()" style="width:auto; padding:8px 12px;">Logout</button>
  </div>
</div>

<div class="container">
  <h1 id="eventName">Loading...</h1>
  <p id="eventDate"></p>

  <div class="row" id="modulesRow"></div>

  
</div>

<script type="module">
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const auth = getAuth(app);

onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "./login.html";
  }
});
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  const auth = getAuth(app);
import { getFirestore, doc, onSnapshot } from "...";
import { getAuth, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAA2Tl7kWuX1RQcqeVgRR5cf_Mwt-DZX-w",
  authDomain: "avora-fc8b4.firebaseapp.com",
  projectId: "avora-fc8b4",
  storageBucket: "avora-fc8b4.firebasestorage.app",
  messagingSenderId: "520572013150",
  appId: "1:520572013150:web:a7efe5fce0a4e26df342cf"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Get eventId
const params = new URLSearchParams(window.location.search);
const eventId = params.get("eventId");

if (!eventId) {
  document.body.innerHTML = "<h2 style='padding:20px;'>No event ID</h2>";
  throw new Error("No eventId");
}
const ref = doc(db, "events", eventId);

// REAL-TIME LISTENER
onSnapshot(ref, (snap) => {
  const data = snap.data();
  if (!data) return;

  const modules = data.modules || {
    checkIn: true,
    donations: true,
    auction: false
  };

  const row = document.getElementById("modulesRow");
  row.innerHTML = "";

  // Event info
  document.getElementById("eventName").innerText = data.name;
  document.getElementById("eventDate").innerText = data.date || "";

  // CHECK-IN MODULE
  if (modules.checkIn) {
    row.innerHTML += `
      <div class="card col clickable" onclick="goToCheckIn()">
        <div>Guests Checked In</div>
        <div class="stat">${data.checkedIn || 0}</div>
        <div style="color:var(--text-muted); margin-top:8px;">Tap to open</div>
      </div>
    `;
  }

  // DONATIONS MODULE
  if (modules.donations) {
    row.innerHTML += `
      <div class="card col">
        <div>Revenue</div>
        <div class="stat">$${data.revenue || 0}</div>
      </div>
    `;
  }

  // AUCTION MODULE
  if (modules.auction) {
    row.innerHTML += `
      <div class="card col">
        <div>Silent Auction</div>
        <div class="stat">Coming Soon</div>
        <button disabled>Setup Auction</button>
      </div>
    `;
  }

  // GUESTS MODULE
  row.innerHTML += `
    <div class="card col clickable" onclick="goToGuests()">
      <div>Guests</div>
      <div class="stat">Manage</div>
      <div style="color:var(--text-muted); margin-top:8px;">Add / Edit List</div>
    </div>
  `;
});


  
  // ACTIONS
window.addRevenue = async function () {
  await updateDoc(ref, {
    revenue: increment(100)
  });
};

  window.goToGuests = function () {
  window.location.href = "./guests.html?eventId=" + eventId;
};

window.checkInGuest = async function () {
  await updateDoc(ref, {
    checkedIn: increment(1)
  });
};

  window.goToCheckIn = function () {
  window.location.href = "./checkin.html?eventId=" + eventId;
};

window.logout = async function () {
  await signOut(auth);
  window.location.href = "./login.html";
};

</script>

  <script>
function goHome() {
  window.location.href = "./index.html";
}
</script>

</body>
</html>
